<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honeywell Production Tracking — Automation Systems</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#0f1117;--bg2:#161b25;--bg3:#1e2535;
  --border:#2a3347;--border2:#3a4a63;
  --text:#e8edf5;--text2:#8a9ab5;--text3:#5a6a85;
  --green:#22c55e;--green-bg:#0d2a1a;--green-border:#166534;
  --red:#ef4444;--red-bg:#2a0d0d;--red-border:#7f1d1d;
  --blue:#3b82f6;--blue-bg:#0d1e3a;--blue-border:#1e3a6e;
  --amber:#f59e0b;--amber-bg:#2a1d0d;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px;width:100%;max-width:400px;text-align:center}
.login-logo{width:56px;height:56px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:22px;font-weight:600;color:#fff;margin:0 auto 16px}
.login-title{font-size:20px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:28px}
.role-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.role-btn{padding:14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all 0.15s}
.role-btn:hover{background:var(--border);border-color:var(--blue)}
.role-btn.customer{border-color:var(--blue-border);color:var(--blue);background:var(--blue-bg)}
.customer-pw{display:none;margin-top:12px}
.customer-pw input{width:100%;font-size:20px;padding:12px;text-align:center;letter-spacing:0.2em;background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:8px;font-family:var(--mono)}
.customer-pw input:focus{outline:none;border-color:var(--blue)}
.pw-btn{width:100%;padding:12px;margin-top:10px;border-radius:8px;background:var(--blue);border:none;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.pw-err{font-size:12px;color:var(--red);margin-top:8px;display:none}

/* MAIN APP */
.app{display:none}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:30px;height:30px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:600;color:#fff}
.header-title{font-size:13px;font-weight:600}
.header-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.header-right{display:flex;align-items:center;gap:8px}
.sync-pill{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);cursor:pointer}
.sync-pill.syncing{background:var(--amber-bg);color:var(--amber);border-color:#78350f}
.sync-pill.error{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.role-badge{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:4px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.logout-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--sans)}
.nav{display:flex;gap:2px;flex-wrap:wrap;padding:8px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.nav button{font-family:var(--sans);font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap}
.nav button:hover{background:var(--bg3);color:var(--text)}
.nav button.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.main{max-width:760px;margin:0 auto;padding:24px 20px}
.page{display:none}.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;font-family:var(--mono)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:8px 10px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:7px;font-family:var(--sans)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue)}
.field select option{background:var(--bg3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.lot-display{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--green);text-align:center;padding:14px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;letter-spacing:0.1em;margin-bottom:4px}
.lot-banner{background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.lot-banner .lot-num{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--green)}
.lot-banner .lot-meta{font-size:11px;color:#4ade80;margin-top:2px}
.no-lot-banner{background:var(--amber-bg);border:1px solid #78350f;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--amber)}
.dim-input{font-family:var(--mono);font-size:13px;padding:7px 6px;text-align:center;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;width:100%}
.dim-input:focus{outline:none;border-color:var(--blue)}
.dim-input.ok{border-color:var(--green-border)!important;background:var(--green-bg)!important;color:var(--green)!important}
.dim-input.hi{border-color:var(--red-border)!important;background:var(--red-bg)!important;color:var(--red)!important}
.dim-input.lo{border-color:var(--blue-border)!important;background:var(--blue-bg)!important;color:var(--blue)!important}
.avg-bar{font-family:var(--mono);font-size:12px;font-weight:600;text-align:center;padding:6px 10px;border-radius:6px;margin-top:6px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.avg-bar.ok{background:var(--green-bg)!important;color:var(--green)!important;border-color:var(--green-border)!important}
.avg-bar.hi{background:var(--red-bg)!important;color:var(--red)!important;border-color:var(--red-border)!important}
.avg-bar.lo{background:var(--blue-bg)!important;color:var(--blue)!important;border-color:var(--blue-border)!important}
.spec-label{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:8px}
.pf-row{display:flex;gap:8px;margin-top:4px}
.pfb{flex:1;padding:9px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:var(--sans)}
.pfb.pass-on{background:var(--green-bg)!important;color:var(--green)!important;border-color:var(--green-border)!important}
.pfb.fail-on{background:var(--red-bg)!important;color:var(--red)!important;border-color:var(--red-border)!important}
.btn{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer;margin-top:6px}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.success{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn.force{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue);margin-top:6px}
.btn.danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.btn.amber{background:var(--amber-bg);border-color:#78350f;color:var(--amber)}
.btn.sm{width:auto;padding:6px 14px;font-size:12px;margin:0}
.scan-input{width:100%;font-family:var(--mono);font-size:20px;padding:14px;text-align:center;background:var(--bg3);color:var(--green);border:2px solid var(--border2);border-radius:8px;letter-spacing:0.06em}
.scan-input:focus{outline:none;border-color:var(--green)}
.subtabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.subtabs button{font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans)}
.subtabs button.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.msg{font-size:13px;margin-top:10px;padding:10px 14px;border-radius:8px;display:none}
.msg.ok{display:block;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.msg.err{display:block;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.msg.info{display:block;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.metric .val{font-family:var(--mono);font-size:26px;font-weight:600;margin-bottom:4px}
.metric .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em}
.metric.oos .val{color:var(--red)}.metric.green .val{color:var(--green)}.metric.blue .val{color:var(--blue)}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.log-row:last-child{border-bottom:none}
.log-lot{font-family:var(--mono);font-size:12px;color:var(--text2)}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;font-family:var(--mono)}
.badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge.oos{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge.dt{background:var(--amber-bg);color:var(--amber);border:1px solid #78350f}
.badge.locked{background:#1a1a2e;color:var(--text3);border:1px solid var(--border)}
.badge.open-lot{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge.ready{background:#1a3a2a;color:#4ade80;border:1px solid #166534}
.iso-bar{font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 12px;background:var(--bg3);border-radius:7px;margin-bottom:14px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono)}
.leg-dot{width:10px;height:10px;border-radius:3px}
.csv-box{font-family:var(--mono);font-size:10px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;white-space:pre-wrap;word-break:break-all;max-height:180px;overflow-y:auto;color:var(--text2);margin-top:10px}
.page-title{font-size:18px;font-weight:600;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.add-btn{font-size:12px;padding:5px 12px;border:1px dashed var(--border2);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);margin-bottom:12px}
.add-btn:hover{border-color:var(--blue);color:var(--blue)}
.lot-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.lot-item .li-num{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--green)}
.lot-item .li-meta{font-size:11px;color:var(--text3);margin-top:2px}
.lot-item.locked{opacity:0.6}.lot-item.locked .li-num{color:var(--text3)}
.lot-item.ready-ship{border-color:var(--green-border);background:var(--green-bg)}
.lot-item.ready-ship .li-num{color:#4ade80}
.divider{height:1px;background:var(--border);margin:14px 0}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;font-family:var(--mono)}
.detail-card{background:var(--amber-bg);border:1px solid #78350f;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--amber);font-family:var(--mono);line-height:1.6}
/* Completion checklist */
.completion-bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;align-items:center}
.completion-bar .cb-label{font-size:11px;font-weight:600;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-right:4px}
.cb-item{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:20px;font-weight:600;border:1px solid var(--border);color:var(--text3);background:var(--bg)}
.cb-item.done{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.cb-item.na{background:#1a1a2e;color:var(--text3);border-color:var(--border);text-decoration:line-through}
.cb-item.pending{background:var(--amber-bg);color:var(--amber);border-color:#78350f}
.na-toggle{font-size:11px;padding:4px 12px;border-radius:20px;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--mono);float:right;margin-top:-2px}
.na-toggle:hover{border-color:var(--amber);color:var(--amber)}
.na-toggle.active{background:var(--amber-bg);color:var(--amber);border-color:#78350f;border-style:solid}
/* Ready to ship table */
.ship-table{width:100%;border-collapse:collapse;font-size:13px}
.ship-table th{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
.ship-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.ship-table td:first-child{font-family:var(--mono);color:var(--green);font-weight:600}
.ship-table tr:last-child td{border-bottom:none}
/* Loading spinner */
.loading{text-align:center;padding:40px;color:var(--text3);font-family:var(--mono);font-size:13px}
/* Customer view */
.cust-dash{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px}
.cust-title{font-size:22px;font-weight:600;margin-bottom:4px}
.cust-sub{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:20px}
/* Print / PDF styles */
@media print{
  body{background:#fff;color:#000;font-family:Arial,sans-serif}
  .no-print{display:none!important}
  .print-only{display:block!important}
  .pdf-container{max-width:100%;padding:20px}
  .pdf-header{border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:16px}
  .pdf-table{width:100%;border-collapse:collapse;font-size:11px}
  .pdf-table th,.pdf-table td{border:1px solid #ccc;padding:5px 8px;text-align:left}
  .pdf-table th{background:#f0f0f0;font-weight:600}
}
.print-only{display:none}
@media(max-width:500px){.g2,.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:repeat(2,1fr)}.main{padding:16px 12px}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">AS</div>
    <div class="login-title">Honeywell Production</div>
    <div class="login-sub">Automation Systems | QF-001 Rev 1</div>
    <div class="role-btns">
      <button class="role-btn" onclick="loginOperator()">Operator / Supervisor / Maintenance<br><span style="font-size:11px;color:var(--text3);font-weight:400">Full access — no password required</span></button>
      <button class="role-btn customer" onclick="showCustomerPW()">Customer — Read Only Access</button>
    </div>
    <div class="customer-pw" id="customer-pw">
      <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPW()">
      <button class="pw-btn" onclick="checkPW()">Access Customer View</button>
      <div class="pw-err" id="pw-err">Incorrect password. Please try again.</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="main-app">
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">AS</div>
      <div>
        <div class="header-title">Honeywell Production Tracking</div>
        <div class="header-sub" id="hdr-sub">QF-001 Rev 1 | ISO 9001:2015</div>
      </div>
    </div>
    <div class="header-right">
      <span class="sync-pill" id="sync-pill" onclick="syncNow()">● Syncing...</span>
      <span class="role-badge" id="role-badge">OPERATOR</span>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>
  <div class="nav" id="main-nav"></div>
  <div class="main" id="main-content"></div>
</div>

<!-- PDF PRINT AREA -->
<div id="pdf-area" class="print-only"></div>

<script>
const WEB_APP='https://script.google.com/macros/s/AKfycbwzRWA8BQYIucQmp69ZKRwtFQFyF57kA5rJ4trEUaphVIp6DvXHWgSdG52AXoeBYG3EaA/exec';
const CUSTOMER_PASSWORD='Honeywell2026';
const SPECS={hollow:{h1:{usl:0.103,lsl:0.091},h2:{usl:0.115,lsl:0.075},h3:{usl:0.160,lsl:0.120}},solid:{s1:{usl:0.047,lsl:0.031},s2:{usl:0.351,lsl:0.335},s3:{usl:0.099,lsl:0.059}}};

let currentRole=null; // 'operator' | 'customer'
let PF={};
let naState={hollow:false,solid:false};
let shellacNA={}; // keyed by lotNum: {hollow:bool, solid:bool} — persists until cleared
let activeLot=null;
let DB={lots:[],custLots:[],entries:[],quality:[],downtime:[],receiving:[]};
let nlClCount=0;
let elClCount=0;
let lastInspRow=null;
let lastDTRow=null;
let qResults=[];
let editingLotNum=null;
let syncTimer=null;
let currentPage='dashboard';

// ==================== LOGIN ====================
function loginOperator(){
  currentRole='operator';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('role-badge').textContent='OPERATOR';
  document.getElementById('role-badge').style.color='var(--green)';
  buildNav();
  startApp();
}
function showCustomerPW(){
  const pw=document.getElementById('customer-pw');
  pw.style.display=pw.style.display==='block'?'none':'block';
  if(pw.style.display==='block')setTimeout(()=>document.getElementById('pw-input').focus(),100);
}
function checkPW(){
  const pw=document.getElementById('pw-input').value;
  if(pw===CUSTOMER_PASSWORD){
    currentRole='customer';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    document.getElementById('role-badge').textContent='CUSTOMER';
    document.getElementById('role-badge').style.color='var(--blue)';
    buildNav();
    startApp();
  }else{
    document.getElementById('pw-err').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
function logout(){
  currentRole=null;
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('customer-pw').style.display='none';
  document.getElementById('pw-input').value='';
  document.getElementById('pw-err').style.display='none';
  if(syncTimer)clearInterval(syncTimer);
}

// ==================== NAV ====================
function buildNav(){
  const nav=document.getElementById('main-nav');
  if(currentRole==='operator'){
    nav.innerHTML=`
      <button class="active" onclick="showPage('dashboard',this)">Dashboard</button>
      <button onclick="showPage('lots',this)">Lot Control</button>
      <button onclick="showPage('inspect',this)">Inspection</button>
      <button onclick="showPage('downtime',this)">Downtime</button>
      <button onclick="showPage('receive',this)">Receiving / Shipping</button>
      <button onclick="showPage('query',this)">Query & Export</button>`;
  }else{
    nav.innerHTML=`
      <button class="active" onclick="showPage('cust-dashboard',this)">Dashboard</button>
      <button onclick="showPage('cust-query',this)">Query & Reports</button>`;
  }
}
function showPage(p,btn){
  currentPage=p;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderPage(p);
}

// ==================== SYNC ====================
function setSyncStatus(status){
  const pill=document.getElementById('sync-pill');
  if(status==='ok'){pill.textContent='● Live';pill.className='sync-pill';}
  else if(status==='syncing'){pill.textContent='↻ Syncing...';pill.className='sync-pill syncing';}
  else{pill.textContent='⚠ Offline';pill.className='sync-pill error';}
}
async function fetchAllData(){
  setSyncStatus('syncing');
  try{
    const r=await fetch(WEB_APP+'?t='+Date.now());
    const raw=await r.json();
    parseSheetData(raw);
    setSyncStatus('ok');
    renderPage(currentPage);
  }catch(e){
    setSyncStatus('error');
    // Fall back to localStorage cache
    loadLocalCache();
  }
}
function parseSheetData(raw){
  // Parse Lots
  if(raw.Lots&&raw.Lots.length>1){
    const hdrs=raw.Lots[0];
    DB.lots=raw.Lots.slice(1).map(r=>{
      const o={};hdrs.forEach((h,i)=>o[h]=r[i]);return o;
    });
  }
  // Parse CustomerLots — build from ReceivingShipping first (primary source),
  // then supplement with CustomerLots tab if it exists
  const clMap={};
  // Source 1: ReceivingShipping tab — rows where Direction === 'RECEIVED'
  if(raw.ReceivingShipping&&raw.ReceivingShipping.length>1){
    const hdrs=raw.ReceivingShipping[0];
    const iLot=hdrs.indexOf('Customer Lot #');
    const iBin=hdrs.indexOf('Bin #');
    const iDir=hdrs.indexOf('Direction');
    const iDate=hdrs.indexOf('Timestamp');
    raw.ReceivingShipping.slice(1).forEach(r=>{
      const dir=String(r[iDir]||'');
      if(!dir.includes('RECEIVED'))return;
      const lotNum=String(r[iLot]||'').trim();
      if(!lotNum)return;
      if(!clMap[lotNum])clMap[lotNum]={lotNum,bins:[],receivedDate:'',status:'open'};
      const bin=String(r[iBin]||'').trim();
      if(bin&&!clMap[lotNum].bins.includes(bin))clMap[lotNum].bins.push(bin);
      if(!clMap[lotNum].receivedDate&&r[iDate])clMap[lotNum].receivedDate=String(r[iDate]).slice(0,10);
    });
  }
  // Source 2: CustomerLots tab — apply close events and any additional data
  if(raw.CustomerLots&&raw.CustomerLots.length>1){
    const hdrs=raw.CustomerLots[0];
    raw.CustomerLots.slice(1).forEach(r=>{
      const lotNum=String(r[0]||'').trim();
      const event=String(r[1]||'');
      const bin=String(r[4]||'').trim();
      if(!lotNum)return;
      if(!clMap[lotNum])clMap[lotNum]={lotNum,bins:[],receivedDate:String(r[3]||'').slice(0,10),status:'open'};
      if(bin&&!clMap[lotNum].bins.includes(bin))clMap[lotNum].bins.push(bin);
      if(event.includes('CLOSED'))clMap[lotNum].status='closed';
      if(event.includes('CLOSED'))clMap[lotNum].closedDate=String(r[2]||'').slice(0,10);
    });
  }
  DB.custLots=Object.values(clMap);
  // Parse QualityEntries
  if(raw.QualityEntries&&raw.QualityEntries.length>1){
    const hdrs=raw.QualityEntries[0];
    DB.quality=raw.QualityEntries.slice(1).map(r=>{
      const o={};hdrs.forEach((h,i)=>o[h]=r[i]);return o;
    });
  }
  // Parse Downtime
  if(raw.Downtime&&raw.Downtime.length>1){
    const hdrs=raw.Downtime[0];
    DB.downtime=raw.Downtime.slice(1).map(r=>{
      const o={};hdrs.forEach((h,i)=>o[h]=r[i]);return o;
    });
  }
  // Parse ReceivingShipping
  if(raw.ReceivingShipping&&raw.ReceivingShipping.length>1){
    const hdrs=raw.ReceivingShipping[0];
    DB.receiving=raw.ReceivingShipping.slice(1).map(r=>{
      const o={};hdrs.forEach((h,i)=>o[h]=r[i]);return o;
    });
  }
  // Rebuild entries array for dashboard
  DB.entries=[
    ...DB.quality.map(q=>({type:'inspection',timestamp:q.Timestamp,lotNum:q['Internal Lot #'],machine:q.Machine,operator:q.Operator,oos:q['OOS Flag']==='OOS'})),
    ...DB.downtime.map(d=>({type:'downtime',timestamp:d.Timestamp,lotNum:d['Internal Lot #'],machine:d.Machine,operator:d.Operator})),
    ...(DB.lots.map?DB.lots.map(l=>({type:'lot',timestamp:l['Start Time'],lotNum:l['Internal Lot #'],machine:l.Machine,operator:l.Operator,status:l.Status})):[]),
  ].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  // Update active lot from DB if we have one saved locally
  // Only clear active lot if it was shipped or manually closed — not just missing from a partial sync
  if(activeLot){
    const found=DB.lots.find(l=>l['Internal Lot #']===activeLot.lotNum);
    if(found){
      const status=(found.Status||'').toUpperCase();
      if(status.includes('SHIPPED')||status.includes('MANUALLY CLOSED')){activeLot=null;}
    }
    // If not found at all yet, keep the active lot — sheet may not have synced it yet
  }
  saveLocalCache();
}
function saveLocalCache(){
  try{
    localStorage.setItem('hw-db-cache',JSON.stringify(DB));
    if(activeLot)localStorage.setItem('hw-activelot',JSON.stringify(activeLot));
    localStorage.setItem('hw-shellac-na',JSON.stringify(shellacNA));
  }catch(e){}
}
function loadLocalCache(){
  try{
    const d=localStorage.getItem('hw-db-cache');if(d)DB=JSON.parse(d);
    if(!activeLot){const a=localStorage.getItem('hw-activelot');if(a&&a!=='null')activeLot=JSON.parse(a);}
    const sna=localStorage.getItem('hw-shellac-na');if(sna)shellacNA=JSON.parse(sna);
  }catch(e){}
}
async function toSheet(sheet,headers,row){
  try{await fetch(WEB_APP,{method:'POST',mode:'no-cors',body:JSON.stringify({sheet,headers,row})});return true;}catch(ex){return false;}
}
async function syncNow(){
  await fetchAllData();
}
function startApp(){
  loadLocalCache();
  fetchAllData();
  // No auto-sync timer — sync happens on load and after each save action
  // Operators can tap the sync pill in the header to manually refresh
  renderPage(currentRole==='operator'?'dashboard':'cust-dashboard');
  document.getElementById('hdr-sub').textContent=new Date().toLocaleDateString([],{weekday:'short',month:'short',day:'numeric',year:'numeric'})+' | QF-001 Rev 1 | ISO 9001:2015';

// ==================== OPERATOR DASHBOARD ====================
function renderDashboard(){
  const today=new Date().toDateString();
  const todayInsp=DB.entries.filter(e=>e.type==='inspection'&&new Date(e.timestamp).toDateString()===today);
  const todayDT=DB.entries.filter(e=>e.type==='downtime'&&new Date(e.timestamp).toDateString()===today);
  const openLots=DB.lots.filter(l=>l.Status==='OPEN'||l.Status==='OPEN-UPDATED');
  const readyLots=DB.lots.filter(l=>l.Status==='OPEN'||l.Status==='OPEN-UPDATED'||l.Status==='CLOSED'||l.Status==='MANUALLY CLOSED').filter(l=>{
    const g=parseInt(l.Good)||0;return g>=3000;
  });
  // Ready to ship = closed lots not yet shipped
  const closedNotShipped=DB.lots.filter(l=>(l.Status||'').includes('CLOSED')&&!(l.Status||'').includes('SHIPPED'));
  const banner=activeLot?
    `<div class="lot-banner"><div><div class="lot-num">${activeLot.lotNum}</div><div class="lot-meta">${activeLot.machine||''} | ${activeLot.partType||''}</div></div><span class="badge open-lot">ACTIVE</span></div>`:
    `<div class="no-lot-banner">⚠ No active lot — go to Lot Control to start or select a lot.</div>`;
  const recent=DB.entries.slice(-8).reverse();
  const recentHTML=recent.length?recent.map(e=>{
    const ts=new Date(e.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const lbl=e.type==='inspection'?'Inspection':e.type==='lot'?'Lot Started':'Downtime';
    const bc=e.type==='downtime'?'dt':e.oos?'oos':'ok';
    return`<div class="log-row"><span>${ts} — ${lbl} <span class="log-lot">${e.lotNum||''}</span></span><span class="badge ${bc}">${e.type==='downtime'?'DT':e.oos?'OOS':'OK'}</span></div>`;
  }).join(''):'<p style="color:var(--text3);font-size:13px">No entries yet today.</p>';

  const readyHTML=closedNotShipped.length?`<table class="ship-table"><thead><tr><th>Lot #</th><th>Machine</th><th>Type</th><th>Good Parts</th><th>Scrap</th><th>Customer Lots</th></tr></thead><tbody>`+
    closedNotShipped.map(l=>`<tr><td>${l['Internal Lot #']||''}</td><td>${l.Machine||''}</td><td>${l['Part Type']||''}</td><td style="color:var(--green);font-weight:600">${l.Good||0}</td><td>${l.Scrap||0}</td><td style="font-size:11px">${l['Customer Lots']||'—'}</td></tr>`).join('')+
    `</tbody></table>`:'<p style="font-size:13px;color:var(--text3)">No lots ready to ship yet.</p>';

  return`
  <div class="iso-bar"><span>AUTOMATION SYSTEMS — HONEYWELL PRODUCTION QUALITY SYSTEM</span><span>${new Date().toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})}</span></div>
  ${banner}
  <div class="metrics">
    <div class="metric"><div class="val">${todayInsp.length}</div><div class="lbl">Inspections today</div></div>
    <div class="metric oos"><div class="val">${todayInsp.filter(e=>e.oos).length}</div><div class="lbl">Out of spec</div></div>
    <div class="metric green"><div class="val">${openLots.length}</div><div class="lbl">Open lots</div></div>
    <div class="metric blue"><div class="val">${closedNotShipped.length}</div><div class="lbl">Ready to ship</div></div>
  </div>
  <div class="card"><div class="card-title">Ready to Ship — Closed Lots</div>${readyHTML}</div>
  <div class="card"><div class="card-title">Recent Activity</div>${recentHTML}</div>`;
}

function attachLotEvents(){
  const d=new Date();
  const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0');
  const dateEl=document.getElementById('nl-date');

}
function setLT(t,btn){
  document.querySelectorAll('#main-content .subtabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['new','edit','custlots'].forEach(id=>{const el=document.getElementById('lt-'+id);if(el)el.style.display=id===t?'block':'none';});

function getCustOpts(){
  return DB.custLots.filter(c=>c.status==='open').map(c=>`<option value="${c.lotNum}">${c.lotNum} (${c.bins.length} bins)</option>`).join('');
}
function genLot(){
  const m=document.getElementById('nl-mach')?.value;
  const dv=document.getElementById('nl-date')?.value;
  const el=document.getElementById('nl-lot');
  if(!el)return;
  if(!dv){el.textContent='--';return;}
  const dt=new Date(dv+'T12:00:00');
  const yy=String(dt.getFullYear()).slice(2);
  const mm=String(dt.getMonth()+1).padStart(2,'0');
  const dd=String(dt.getDate()).padStart(2,'0');
  const todayLots=DB.lots.filter(l=>l['Machine']&&l['Machine'].includes('#'+parseInt(m))&&l['Date']===dv);
  const bin=String(todayLots.length+1).padStart(2,'0');
  el.textContent=`${m}-${yy}${mm}${dd}-${bin}`;
}
function addNLCustLot(){

async function startLot(){
  const lotNum=document.getElementById('nl-lot')?.textContent.trim();
  const op=document.getElementById('nl-op')?.value.trim().toUpperCase();
  if(!lotNum||lotNum==='--'){showMsg('nl-msg','Select a date first','err');return;}
  if(!op){showMsg('nl-msg','Enter operator initials','err');return;}
  const cls=[];
  for(let i=1;i<=nlClCount;i++){
    const s=document.getElementById('nl-cl-'+i);const b=document.getElementById('nl-bin-'+i);
    if(s&&s.value)cls.push({lot:s.value,bin:b?b.value.trim():''});
  }
  const mach='S&F #'+document.getElementById('nl-mach').value;
  const mc=document.getElementById('nl-mach').value;
  const ptype=document.getElementById('nl-ptype').value;
  const good=parseInt(document.getElementById('nl-good').value)||0;
  const bad=parseInt(document.getElementById('nl-bad').value)||0;
  const scrap=parseInt(document.getElementById('nl-scrap').value)||0;
  const ts=new Date().toISOString();
  activeLot={lotNum,machine:mach,machCode:mc,partType:ptype,date:document.getElementById('nl-date').value,operator:op,custLots:cls,startTime:ts};
  const hdrs=['Internal Lot #','Machine','Part Type','Date','Operator','Customer Lots','Start Time','Good','Bad','Scrap','Status'];
  const row=[lotNum,mach,ptype,activeLot.date,op,cls.length?cls.map(c=>c.lot+(c.bin?' bin '+c.bin:'')).join('; '):'(none)',ts,good,bad,scrap,'OPEN'];
  const synced=await toSheet('Lots',hdrs,row);
  saveLocalCache();
  await fetchAllData();
  showMsg('nl-msg','Lot '+lotNum+' started'+(synced?' — synced to Google Sheets':' — check connection'),'ok');
}

  saveLocalCache();
  const btn=document.getElementById('el-active-btn');
  if(btn){btn.textContent='✓ Currently Active Lot';btn.className='btn success';}
  showMsg('el-msg',editingLotNum+' is now the active lot','ok');
}
async function saveEditLot(){
  if(!editingLotNum)return;
  const newCls=[];
  for(let i=1;i<=elClCount;i++){
    const s=document.getElementById('el-cl-'+i);const b=document.getElementById('el-bin-'+i);
    if(s&&s.value)newCls.push(s.value+(b&&b.value?' bin '+b.value:''));
  }
  const good=parseInt(document.getElementById('el-good').value)||0;
  const bad=parseInt(document.getElementById('el-bad').value)||0;
  const scrap=parseInt(document.getElementById('el-scrap').value)||0;
  const lot=DB.lots.find(l=>l['Internal Lot #']===editingLotNum);
  const existingCls=lot&&lot['Customer Lots']?lot['Customer Lots']:'';
  const allCls=existingCls+(newCls.length?(existingCls?'; ':'')+newCls.join('; '):'');
  const hdrs=['Internal Lot #','Machine','Part Type','Date','Operator','Customer Lots','Start Time','Good','Bad','Scrap','Status'];
  const row=[editingLotNum,lot?.Machine||'',lot?.['Part Type']||'',lot?.Date||'',lot?.Operator||'',allCls,lot?.['Start Time']||'',good,bad,scrap,'OPEN-UPDATED'];
  await toSheet('Lots',hdrs,row);
  await fetchAllData();
  showMsg('el-msg','Lot '+editingLotNum+' updated','ok');
}
async function manualCloseLot(){
  if(!editingLotNum)return;
  if(!confirm('Close lot '+editingLotNum+' without shipping?'))return;
  await toSheet('Lots',['Internal Lot #','Machine','Part Type','Date','Operator','Customer Lots','Start Time','Good','Bad','Scrap','Status'],[editingLotNum,'','','','','','','','','','MANUALLY CLOSED']);
  if(activeLot&&activeLot.lotNum===editingLotNum){
    activeLot=null;
    try{localStorage.removeItem('hw-activelot');}catch(e){}
    saveLocalCache();
  }
  await fetchAllData();
  editingLotNum=null;
  showMsg('el-msg','Lot closed','ok');
}
async function closeCustLot(lotNum){
  if(!confirm('Mark customer lot '+lotNum+' as empty?'))return;
  await toSheet('CustomerLots',['Customer Lot #','Event','Date','Received Date'],[lotNum,'CLOSED — EMPTY',new Date().toISOString().slice(0,10),'']);
  await fetchAllData();
}

function onLotSelectChange(){

  const disp=document.getElementById('in-machine-display');
  if(disp&&lot)disp.textContent='Machine: '+(lot.Machine||'—')+' | Part type: '+(lot['Part Type']||'—');

}
function setIT(t,btn){
  document.querySelectorAll('#main-content .subtabs button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  ['hollow','solid'].forEach(id=>{const el=document.getElementById('it-'+id);if(el)el.style.display=id===t?'block':'none';});
}
function getActiveLotNum(){
  // Get lot num from dropdown if on inspect page, else from activeLot
  const sel=document.getElementById('in-lot-select');
  return sel?sel.value:(activeLot?activeLot.lotNum:null);
}
function getShellacNA(part){
  const lot=getActiveLotNum();
  return lot&&shellacNA[lot]?shellacNA[lot][part]===true:false;
}
function markShellacNA(part){
  const lot=getActiveLotNum();
  if(!lot)return;
  if(!shellacNA[lot])shellacNA[lot]={hollow:false,solid:false};
  shellacNA[lot][part]=true;
  saveLocalCache();
  applyShellacNAUI(part,true);
}
function clearShellacNA(part){
  const lot=getActiveLotNum();
  if(!lot)return;
  if(!shellacNA[lot])shellacNA[lot]={hollow:false,solid:false};
  shellacNA[lot][part]=false;
  saveLocalCache();
  applyShellacNAUI(part,false);
}
function applyShellacNAUI(part,isNA){
  const bar=document.getElementById('sh-'+part+'-na-bar');
  const content=document.getElementById('sh-'+part+'-content');
  const btn=part==='hollow'?document.getElementById('na-btn-sh-hollow'):document.getElementById('na-btn-ss-solid');
  if(isNA){
    if(bar)bar.style.display='block';
    if(content)content.style.display='none';
    if(btn)btn.className='na-toggle active';
  }else{
    if(bar)bar.style.display='none';
    if(content)content.style.display='block';
    if(btn)btn.className='na-toggle';
  }
}
function applyAllShellacNA(){
  // Called after lot selection changes — apply persisted shellacNA state for selected lot
  ['hollow','solid'].forEach(part=>applyShellacNAUI(part,getShellacNA(part)));
}
function markNA(section){
  naState[section]=true;
  const content=document.getElementById(section+'-content');
  const bar=document.getElementById(section+'-na-bar');
  if(content)content.style.display='none';
  if(bar)bar.style.display='flex';
  const btn=document.getElementById('na-btn-'+section);if(btn)btn.className='na-toggle active';
  updateChecklist();
}
function clearNA(section){
  naState[section]=false;
  const content=document.getElementById(section+'-content');
  const bar=document.getElementById(section+'-na-bar');
  if(content)content.style.display='block';
  if(bar)bar.style.display='none';
  const btn=document.getElementById('na-btn-'+section);if(btn)btn.className='na-toggle';
  updateChecklist();
}
function updateChecklist(){
  ['hollow','solid'].forEach(s=>{
    const cb=document.getElementById('cb-'+s);if(!cb)return;
    const label=s==='hollow'?'Hollow Dims':'Solid Dims';
    if(naState[s]){cb.className='cb-item na';cb.textContent=label+' N/A';return;}
    let hasData=false;
    if(s==='hollow')hasData=['h1a','h2a','h3a'].some(id=>{const el=document.getElementById(id);return el&&el.value;});
    else hasData=['s1a','s2a','s3a'].some(id=>{const el=document.getElementById(id);return el&&el.value;});
    cb.className='cb-item '+(hasData?'done':'pending');
    cb.textContent=hasData?label+' ✓':label;
  });
}
function chk(dim,type){
  const p=type==='hollow'?'h':'s';const n=dim.replace(p,'');const sp=SPECS[type][p+n];
  const vals=['a','b','c','d'].map(l=>{
    const el=document.getElementById(p+n+l);if(!el)return null;
    const v=parseFloat(el.value);
    if(isNaN(v)){el.className='dim-input';return null;}
    el.className='dim-input '+(v>sp.usl?'hi':v<sp.lsl?'lo':'ok');return v;
  }).filter(v=>v!==null);
  const avgEl=document.getElementById(p+n+'avg');
  if(!vals.length){avgEl.textContent='Average —';avgEl.className='avg-bar';return;}
  const avg=vals.reduce((a,b)=>a+b)/vals.length;
  const ins=avg>=sp.lsl&&avg<=sp.usl;
  avgEl.textContent='AVG '+avg.toFixed(4)+(ins?' — IN SPEC ✓':avg>sp.usl?' — OVER USL ▲':' — UNDER LSL ▼');
  avgEl.className='avg-bar '+(ins?'ok':avg>sp.usl?'hi':'lo');
  updateChecklist();
}
function pf(btn,id,val){
  PF[id]=val;
  const pe=document.getElementById(id+'p');const fe=document.getElementById(id+'f');
  if(pe)pe.className='pfb'+(val==='P'?' pass-on':'');
  if(fe)fe.className='pfb'+(val==='F'?' fail-on':'');
  updateChecklist();
}
function getDims(p,type){
  return[1,2,3].map(n=>{
    const sp=SPECS[type][p+n];
    const vals=['a','b','c','d'].map(l=>{const el=document.getElementById(p+n+l);return el?parseFloat(el.value):NaN;});
    const good=vals.filter(v=>!isNaN(v));
    const avg=good.length?good.reduce((a,b)=>a+b)/good.length:null;
    return{vals:vals.map(v=>isNaN(v)?'':v),avg,oos:avg!==null?(avg>sp.usl||avg<sp.lsl):false};
  });
}
async function submitInsp(){
  const op=document.getElementById('in-op')?.value.trim().toUpperCase();
  if(!op){showMsg('in-msg','Enter operator initials','err');return;}
  const lotSel=document.getElementById('in-lot-select');
  const lotNum=lotSel?lotSel.value:'';
  if(!lotNum){showMsg('in-msg','Select a lot first','err');return;}
  const selectedLot=DB.lots.find(l=>l['Internal Lot #']===lotNum);
  const machine=selectedLot?selectedLot.Machine||'—':'—';
  const hd=getDims('h','hollow'),sd=getDims('s','solid');
  const hpf=[PF.h4||'—',PF.h5||'—',PF.h6||'—'];
  const spf=[PF.s4||'—',PF.s5||'—',PF.s6||'—'];
  const sc={
    hVoids:getShellacNA('hollow')?'N/A':(PF.sh1||'—'),
    hExcess:getShellacNA('hollow')?'N/A':(PF.sh2||'—'),
    hOffcenter:getShellacNA('hollow')?'N/A':(PF.sh3||'—'),
    sVoids:getShellacNA('solid')?'N/A':(PF.ss1||'—'),

    notes:document.getElementById('sc-notes')?.value||''
  };
  const oos=(!naState.hollow&&(hd.some(d=>d.oos)||hpf.includes('F')))||
            (!naState.solid&&(sd.some(d=>d.oos)||spf.includes('F')))||
            (!getShellacNA('hollow')&&(sc.hVoids==='F'||sc.hExcess==='F'||sc.hOffcenter==='F'))||
            (!getShellacNA('solid')&&(sc.sVoids==='F'||sc.sExcess==='F'||sc.sOffcenter==='F'));
  const ts=new Date().toISOString();
  const hdrs=['Timestamp','Internal Lot #','Machine','Operator',
    'H1A','H1B','H1C','H1D','H1 Avg','H2A','H2B','H2C','H2D','H2 Avg','H3A','H3B','H3C','H3D','H3 Avg','H4 ID','H5 OD','H6 Visual',
    'S1A','S1B','S1C','S1D','S1 Avg','S2A','S2B','S2C','S2D','S2 Avg','S3A','S3B','S3C','S3D','S3 Avg','S4 ID','S5 OD','S6 Visual',
    'Shellac-H Voids','Shellac-H Excess','Shellac-H Off-Center',

function runQ(){
  const from=document.getElementById('q-from')?.value;
  const to=document.getElementById('q-to')?.value;
  const lot=(document.getElementById('q-lot')?.value||'').trim().toLowerCase();
  const clot=(document.getElementById('q-clot')?.value||'').trim().toLowerCase();
  const mach=document.getElementById('q-mach')?.value;
  const type=document.getElementById('q-type')?.value;
  let results=[];
  if(!type||type==='inspection')results.push(...DB.quality.map(q=>({type:'inspection',ts:q.Timestamp,lot:q['Internal Lot #'],machine:q.Machine,op:q.Operator,oos:q['OOS Flag']==='OOS',custLots:''})));
  if(!type||type==='downtime')results.push(...DB.downtime.map(d=>({type:'downtime',ts:d.Timestamp,lot:d['Internal Lot #'],machine:d.Machine,op:d.Operator,oos:false,custLots:''})));
  if(!type||type==='lot')results.push(...DB.lots.map(l=>({type:'lot',ts:l['Start Time'],lot:l['Internal Lot #'],machine:l.Machine,op:l.Operator,oos:false,custLots:l['Customer Lots']||'',status:l.Status})));
  if(!type||type==='receiving')results.push(...DB.receiving.filter(r=>r.Direction==='RECEIVED').map(r=>({type:'receiving',ts:r.Timestamp,lot:r['Customer Lot #'],machine:'',op:r.Operator,oos:false,custLots:''})));
  if(!type||type==='shipping')results.push(...DB.receiving.filter(r=>(r.Direction||'').includes('SHIPPED')).map(r=>({type:'shipping',ts:r.Timestamp,lot:r['Internal Lot #'],machine:'',op:r['Shipped By']||r.Operator,oos:false,custLots:''})));
  results=results.filter(e=>{
    if(lot&&!(e.lot||'').toLowerCase().includes(lot))return false;
    if(clot&&!(e.custLots||'').toLowerCase().includes(clot))return false;
    if(mach&&e.machine!==mach)return false;
    if(from&&(e.ts||'')<from)return false;
    if(to&&(e.ts||'')>to+'T23:59:59')return false;
    return true;
  }).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  qResults=results;
  const el=document.getElementById('q-results');
  if(!results.length){if(el)el.innerHTML='<p style="color:var(--text3);font-size:13px">No records found.</p>';const cs=document.getElementById('csv-section');if(cs)cs.style.display='none';return;}
  if(el)el.innerHTML='<div class="card">'+results.slice(0,100).map(e=>{
    const ts=new Date(e.ts||Date.now()).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const lbl=e.type==='inspection'?'Inspection':e.type==='lot'?'Lot Started':e.type==='downtime'?'Downtime':e.type==='receiving'?'Incoming':'Shipped';
    const bc=e.type==='downtime'?'dt':e.oos?'oos':'ok';
    return`<div class="log-row"><span>${ts} — ${lbl}${e.machine?' | '+e.machine:''}<br><span class="log-lot">${e.lot||'—'}</span></span><span class="badge ${bc}">${e.type==='downtime'?'DT':e.oos?'OOS':'OK'}</span></div>`;
  }).join('')+'</div>';
  const hdrs=['Timestamp','Type','Lot','Machine','Operator','OOS'];
  const csv=[hdrs,...results.map(e=>[e.ts,e.type,e.lot,e.machine,e.op,e.oos?'OOS':'OK'])].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const ct=document.getElementById('csv-text');const cs=document.getElementById('csv-section');
  if(ct)ct.textContent=csv;if(cs)cs.style.display='block';
  showMsg('q-msg',results.length+' records found','ok');
}

function runCustQ(){
  const from=document.getElementById('cq-from')?.value;
  const to=document.getElementById('cq-to')?.value;
  const lot=(document.getElementById('cq-lot')?.value||'').trim().toLowerCase();

  });
  const el=document.getElementById('cq-results');
  if(!lots.length){if(el)el.innerHTML='<p style="color:var(--text3);font-size:13px">No lots found.</p>';return;}
  if(el)el.innerHTML='<div class="card">'+lots.map(l=>{
    const qCount=DB.quality.filter(q=>q['Internal Lot #']===l['Internal Lot #']).length;
    const oosCount=DB.quality.filter(q=>q['Internal Lot #']===l['Internal Lot #']&&q['OOS Flag']==='OOS').length;
    return`<div class="log-row"><div><div style="font-family:var(--mono);font-size:14px;font-weight:600;color:var(--green)">${l['Internal Lot #']||''}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${l['Part Type']||''} | Good: ${l.Good||0} | Customer lots: ${l['Customer Lots']||'—'}</div><div style="font-size:11px;color:var(--text3)">${qCount} inspections | ${oosCount} OOS events</div></div><button class="btn sm" style="background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)" onclick="generatePDF('${l['Internal Lot #']}')">Download PDF</button></div>`;
  }).join('')+'</div>';
  showMsg('cq-msg',lots.length+' lots found','ok');
}
function generatePDF(lotNum){
  const lot=DB.lots.find(l=>l['Internal Lot #']===lotNum);
  if(!lot)return;
  const quality=DB.quality.filter(q=>q['Internal Lot #']===lotNum);
  const downtime=DB.downtime.filter(d=>d['Internal Lot #']===lotNum);
  const oosCount=quality.filter(q=>q['OOS Flag']==='OOS').length;
  const pdfArea=document.getElementById('pdf-area');
  pdfArea.innerHTML=`
    <div class="pdf-container" style="font-family:Arial,sans-serif;color:#000;padding:20px;max-width:900px">
      <div class="pdf-header" style="border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:18px;font-weight:700">AUTOMATION SYSTEMS</div>
            <div style="font-size:13px;margin-top:2px">Production Quality Report — Honeywell</div>
          </div>
          <div style="text-align:right;font-size:11px;line-height:1.8">
            <div><strong>Form No:</strong> QF-001</div>
            <div><strong>Rev:</strong> 1</div>
            <div><strong>Date:</strong> ${new Date().toLocaleDateString()}</div>
            <div><strong>ISO 9001:2015</strong></div>
          </div>
        </div>
      </div>
      <div style="margin-bottom:16px">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600;width:150px">Internal Lot #</td><td style="padding:4px 8px;border:1px solid #ccc;font-family:monospace;font-weight:700">${lotNum}</td><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600;width:150px">Machine</td><td style="padding:4px 8px;border:1px solid #ccc">${lot.Machine||'—'}</td></tr>
          <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600">Part Type</td><td style="padding:4px 8px;border:1px solid #ccc">${lot['Part Type']||'—'}</td><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600">Start Date</td><td style="padding:4px 8px;border:1px solid #ccc">${lot['Start Time']?new Date(lot['Start Time']).toLocaleDateString():'—'}</td></tr>
          <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600">Customer Lots</td><td style="padding:4px 8px;border:1px solid #ccc" colspan="3">${lot['Customer Lots']||'—'}</td></tr>
          <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600">Good Parts</td><td style="padding:4px 8px;border:1px solid #ccc">${lot.Good||0}</td><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600">Scrap</td><td style="padding:4px 8px;border:1px solid #ccc">${lot.Scrap||0}</td></tr>
          <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600">Total Inspections</td><td style="padding:4px 8px;border:1px solid #ccc">${quality.length}</td><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600">OOS Events</td><td style="padding:4px 8px;border:1px solid #ccc;color:${oosCount>0?'#c00':'#000'}">${oosCount}</td></tr>
          <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:600">Status</td><td style="padding:4px 8px;border:1px solid #ccc;font-weight:600" colspan="3">${lot.Status||'—'}</td></tr>
        </table>
      </div>
      ${quality.length?`
      <div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;border-bottom:1px solid #ccc;padding-bottom:4px">INSPECTION DATA — HOLLOW DIMENSIONS</div>
        <table class="pdf-table" style="width:100%;border-collapse:collapse;font-size:10px">
          <thead><tr style="background:#f0f0f0"><th style="border:1px solid #ccc;padding:4px">Timestamp</th><th style="border:1px solid #ccc;padding:4px">Operator</th><th style="border:1px solid #ccc;padding:4px">H-Voids</th><th style="border:1px solid #ccc;padding:4px">H-Excess</th><th style="border:1px solid #ccc;padding:4px">H-OffCtr</th><th style="border:1px solid #ccc;padding:4px">S-Voids</th><th style="border:1px solid #ccc;padding:4px">S-Excess</th><th style="border:1px solid #ccc;padding:4px">S-OffCtr</th><th style="border:1px solid #ccc;padding:4px">N/A</th><th style="border:1px solid #ccc;padding:4px">OOS</th></tr></thead>
          <tbody>${quality.map(q=>`<tr><td style="border:1px solid #ccc;padding:3px 4px">${q.Timestamp?new Date(q.Timestamp).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):''}</td><td style="border:1px solid #ccc;padding:3px 4px">${q.Operator||''}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['Shellac-H Voids']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['Shellac-H Excess']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['Shellac-H Off-Center']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['Shellac-S Voids']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['Shellac-S Excess']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['Shellac-S Off-Center']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['Shellac N/A']||''}</td><td style="border:1px solid #ccc;padding:3px 4px;color:${q['OOS Flag']==='OOS'?'#c00':'#060'};font-weight:600">${q['OOS Flag']||'OK'}</td></tr>`).join('')}</tbody>
        </table>
      </div>
      <div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;border-bottom:1px solid #ccc;padding-bottom:4px">INSPECTION DATA — SOLID DIMENSIONS</div>
        <table class="pdf-table" style="width:100%;border-collapse:collapse;font-size:10px">
          <thead><tr style="background:#f0f0f0"><th style="border:1px solid #ccc;padding:4px">Timestamp</th><th style="border:1px solid #ccc;padding:4px">Operator</th><th style="border:1px solid #ccc;padding:4px">S1 Avg</th><th style="border:1px solid #ccc;padding:4px">S2 Avg</th><th style="border:1px solid #ccc;padding:4px">S3 Avg</th><th style="border:1px solid #ccc;padding:4px">S4 ID</th><th style="border:1px solid #ccc;padding:4px">S5 OD</th><th style="border:1px solid #ccc;padding:4px">S6 Vis</th><th style="border:1px solid #ccc;padding:4px">Solid N/A</th><th style="border:1px solid #ccc;padding:4px">OOS</th></tr></thead>
          <tbody>${quality.map(q=>`<tr><td style="border:1px solid #ccc;padding:3px 4px">${q.Timestamp?new Date(q.Timestamp).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):''}</td><td style="border:1px solid #ccc;padding:3px 4px">${q.Operator||''}</td><td style="border:1px solid #ccc;padding:3px 4px;font-family:monospace">${q['S1 Avg']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px;font-family:monospace">${q['S2 Avg']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px;font-family:monospace">${q['S3 Avg']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['S4 ID']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['S5 OD']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['S6 Visual']||'—'}</td><td style="border:1px solid #ccc;padding:3px 4px">${q['Solid N/A']||''}</td><td style="border:1px solid #ccc;padding:3px 4px;color:${q['OOS Flag']==='OOS'?'#c00':'#060'};font-weight:600">${q['OOS Flag']||'OK'}</td></tr>`).join('')}</tbody>
        </table>
      </div>`:''}
      ${downtime.length?`
      <div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;border-bottom:1px solid #ccc;padding-bottom:4px">DOWNTIME / MAINTENANCE LOG</div>
        <table style="width:100%;border-collapse:collapse;font-size:10px">
          <thead><tr style="background:#f0f0f0"><th style="border:1px solid #ccc;padding:4px">Date/Time</th><th style="border:1px solid #ccc;padding:4px">Machine</th><th style="border:1px solid #ccc;padding:4px">Type</th><th style="border:1px solid #ccc;padding:4px">Duration</th><th style="border:1px solid #ccc;padding:4px">Description</th><th style="border:1px solid #ccc;padding:4px">Corrective Action</th></tr></thead>
          <tbody>${downtime.map(d=>`<tr><td style="border:1px solid #ccc;padding:3px 4px">${d.Timestamp?new Date(d.Timestamp).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):''}</td><td style="border:1px solid #ccc;padding:3px 4px">${d.Machine||''}</td><td style="border:1px solid #ccc;padding:3px 4px">${d.Type||''}</td><td style="border:1px solid #ccc;padding:3px 4px">${d['Duration (min)']||0} min</td><td style="border:1px solid #ccc;padding:3px 4px">${d.Description||''}</td><td style="border:1px solid #ccc;padding:3px 4px">${d['Corrective Action']||''}</td></tr>`).join('')}</tbody>
        </table>
      </div>`:''}
      <div style="margin-top:40px;border-top:1px solid #ccc;padding-top:12px;font-size:11px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px">
        <div><div style="font-weight:600;margin-bottom:20px">Prepared by:</div><div style="border-top:1px solid #000;padding-top:4px">Signature / Date</div></div>
        <div><div style="font-weight:600;margin-bottom:20px">Reviewed by:</div><div style="border-top:1px solid #000;padding-top:4px">Signature / Date</div></div>
        <div><div style="font-weight:600;margin-bottom:20px">Approved by:</div><div style="border-top:1px solid #000;padding-top:4px">Signature / Date</div></div>
      </div>
    </div>`;
  window.print();
}

// ==================== HELPERS ====================
function showMsg(id,msg,type){
  const el=document.getElementById(id);if(!el)return;
  el.textContent=msg;el.className='msg '+type;
  setTimeout(()=>{if(el)el.className='msg';},5000);
}
</script>
</body>
</html>
